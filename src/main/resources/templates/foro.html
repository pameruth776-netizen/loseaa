<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: html"
      th:with="titulo='Foro | Red Solidaria UTP'">
<head></head>
<body>
<div th:fragment="content">
    <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 2rem 1rem;">
        <div class="header" style="text-align: center; margin-bottom: 2rem;">
            <h1 class="rs-section-title" style="margin-bottom: 0.5rem;">💬 Foro Comunitario</h1>
            <p style="color: #6B7280;">Comparte experiencias, haz preguntas y conecta con la comunidad</p>
        </div>

        <!-- Botón nueva publicación (redirige a login) -->
        <div style="text-align: center; margin-bottom: 2rem;">
            <a th:href="@{/login}" class="rs-btn-primary" style="display: inline-flex; align-items: center; gap: 0.5rem;">
                ✍️ Crear Nueva Publicacion
            </a>
        </div>
        <!-- Mensaje para no autenticados -->
        <div class="login-message" style="background-color: #DBEAFE; border: 1px solid #93C5FD; border-radius: 12px; padding: 1rem; text-align: center; margin-bottom: 2rem;">
            <p>🔐 <strong>Inicia sesión</strong> para crear publicaciones y participar en el foro</p>
            <a th:href="@{/login}" class="rs-btn-secondary" style="margin-top: 0.5rem; display: inline-block;">Iniciar Sesión</a>
        </div>

        <!-- Filtros -->
        <div class="rs-foro-filters" id="filters" style="display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-bottom: 2rem;"></div>

        <!-- Lista de posts -->
        <div id="postsList" class="posts-list" style="display: flex; flex-direction: column; gap: 1.5rem;"></div>
    </div>

    <script>
        let allPosts = [];
        let currentFilter = 'Todos';

        async function cargarPublicaciones() {
            try {
                const res = await fetch('/api/foro/publicaciones');
                const data = await res.json();
                allPosts = Array.isArray(data) ? data : [];
                renderizarPosts();
                renderizarFiltros();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('postsList').innerHTML = '<div style="text-align:center; padding:3rem;"><p>Error al cargar publicaciones</p></div>';
            }
        }

        function renderizarFiltros() {
            const categorias = ['Todos', 'Experiencia', 'Consejo', 'Capacitación', 'Agradecimiento', 'Pregunta'];
            const container = document.getElementById('filters');
            if (!container) return;
            
            container.innerHTML = categorias.map(cat => `
                <button class="rs-filter-btn ${currentFilter === cat ? 'active' : ''}" data-categoria="${cat}">
                    ${cat}
                </button>
            `).join('');
            
            document.querySelectorAll('.rs-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentFilter = btn.dataset.categoria;
                    renderizarFiltros();
                    renderizarPosts();
                });
            });
        }

        function renderizarPosts() {
            const filtered = currentFilter === 'Todos' 
                ? allPosts 
                : allPosts.filter(p => p.categoria === currentFilter);
            
            const container = document.getElementById('postsList');
            if (!container) return;
            
            if (!filtered.length) {
                container.innerHTML = '<div style="text-align:center; padding:3rem;"><p>No hay publicaciones en esta categoría</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map(p => `
                <div class="rs-post-card">
                    <div class="rs-post-header">
                        <div class="rs-post-avatar">${p.usuario?.nombres?.charAt(0) || 'U'}</div>
                        <div>
                            <div class="rs-post-author">${p.usuario?.nombres || 'Usuario'} ${p.usuario?.apellidos || ''}</div>
                            <div class="rs-post-date">${p.categoria} • ${new Date(p.fechaCreacion).toLocaleDateString()}</div>
                        </div>
                    </div>
                    <div class="rs-post-title">${escapeHtml(p.titulo)}</div>
                    <div class="rs-post-content">${escapeHtml(p.contenido)}</div>
                    <div class="rs-post-stats">
                        <span>❤️ ${p.likes || 0}</span>
                        <span>💬 ${p.comentariosCount || 0}</span>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        cargarPublicaciones();
    </script>
</div>
</body>
</html>
