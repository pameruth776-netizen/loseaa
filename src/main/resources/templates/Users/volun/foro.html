<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{Users/volun/layoutVol :: html(content=~{::content})}"
      th:with="titulo='Foro Comunitario'">
<head></head>
<body>
<div th:fragment="content">
    <!-- Contenedor con información del usuario logueado en la sesión -->
    <div id="usuario-actual-data"
         th:if="${session.usuario != null}"
         th:data-id="${session.usuario.id}"
         th:data-nombres="${session.usuario.nombres}"
         th:data-apellidos="${session.usuario.apellidos}"
         th:data-rol="${session.usuario.rol}"
         style="display: none;"></div>
    <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 2rem 1rem;">
        <div class="header" style="text-align: center; margin-bottom: 2rem;">
            <h1 class="rs-section-title" style="margin-bottom: 0.5rem;">💬 Foro Comunitario</h1>
            <p style="color: #6B7280;">Comparte experiencias, haz preguntas y conecta con la comunidad</p>
        </div>

        <div style="text-align: center; margin-bottom: 2rem;">
            <button id="newPostBtn" class="rs-btn-primary">✍️ Crear Nueva Publicación</button>
        </div>

        <div class="rs-foro-filters" id="filters" style="display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-bottom: 2rem;"></div>
        <div id="postsList" style="display: flex; flex-direction: column; gap: 1.5rem;"></div>
    </div>

    <!-- Modal Crear Publicación -->
    <div id="modalCrear" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header"><h3>Nueva Publicación</h3><span class="modal-close" onclick="cerrarModal('modalCrear')">&times;</span></div>
            <input type="text" id="titulo" placeholder="Título" class="modal-input">
            <select id="categoria" class="modal-input">
                <option value="Experiencia">Experiencia</option>
                <option value="Consejo">Consejo</option>
                <option value="Capacitación">Capacitación</option>
                <option value="Agradecimiento">Agradecimiento</option>
                <option value="Pregunta">Pregunta</option>
            </select>
            <textarea id="contenido" rows="5" placeholder="Contenido..." class="modal-input"></textarea>
            <button id="guardarBtn" class="rs-btn-primary">Publicar</button>
        </div>
    </div>

    <!-- Modal Editar Publicación -->
    <div id="modalEditar" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header"><h3>Editar Publicación</h3><span class="modal-close" onclick="cerrarModal('modalEditar')">&times;</span></div>
            <input type="hidden" id="editId">
            <input type="text" id="editTitulo" placeholder="Título" class="modal-input">
            <select id="editCategoria" class="modal-input">
                <option value="Experiencia">Experiencia</option>
                <option value="Consejo">Consejo</option>
                <option value="Capacitación">Capacitación</option>
                <option value="Agradecimiento">Agradecimiento</option>
                <option value="Pregunta">Pregunta</option>
            </select>
            <textarea id="editContenido" rows="5" placeholder="Contenido..." class="modal-input"></textarea>
            <button id="actualizarBtn" class="rs-btn-primary">Actualizar</button>
        </div>
    </div>

    <!-- Modal Comentarios -->
    <div id="modalComentarios" class="modal" style="display:none;">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header"><h3>Comentarios</h3><span class="modal-close" onclick="cerrarModal('modalComentarios')">&times;</span></div>
            <div id="listaComentarios" style="max-height: 300px; overflow-y: auto; margin-bottom: 1rem;"></div>
            <textarea id="comentarioTexto" rows="3" placeholder="Escribe un comentario..." class="modal-input"></textarea>
            <button id="enviarComentarioBtn" class="rs-btn-primary">Comentar</button>
        </div>
    </div>

    <!-- Modal Editar Comentario -->
    <div id="modalEditarComentario" class="modal" style="display:none;">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header"><h3>Editar Comentario</h3><span class="modal-close" onclick="cerrarModal('modalEditarComentario')">&times;</span></div>
            <input type="hidden" id="editComentarioId">
            <textarea id="editComentarioTexto" rows="3" placeholder="Editar comentario..." class="modal-input"></textarea>
            <button id="actualizarComentarioBtn" class="rs-btn-primary">Actualizar Comentario</button>
        </div>
    </div>

    <script>
        let allPosts = [];
        let currentFilter = 'Todos';
        let usuarioActual = null;
        let publicacionActualId = null;
        let currentComments = [];

        async function obtenerUsuarioActual() {
            const el = document.getElementById('usuario-actual-data');
            if (el) {
                usuarioActual = {
                    id: parseInt(el.getAttribute('data-id')),
                    nombres: el.getAttribute('data-nombres'),
                    apellidos: el.getAttribute('data-apellidos'),
                    rol: el.getAttribute('data-rol')
                };
            }
        }

        async function cargarPublicaciones() {
            try {
                const res = await fetch('/api/foro/publicaciones');
                const data = await res.json();
                allPosts = Array.isArray(data) ? data : [];
                renderizarPosts();
                renderizarFiltros();
            } catch (error) {
                document.getElementById('postsList').innerHTML = '<div style="text-align:center; padding:3rem;"><p>Error al cargar publicaciones</p></div>';
            }
        }

        function renderizarFiltros() {
            const categorias = ['Todos', 'Experiencia', 'Consejo', 'Capacitación', 'Agradecimiento', 'Pregunta'];
            const container = document.getElementById('filters');
            container.innerHTML = categorias.map(cat => `<button class="rs-filter-btn ${currentFilter === cat ? 'active' : ''}" data-categoria="${cat}">${cat}</button>`).join('');
            document.querySelectorAll('.rs-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => { currentFilter = btn.dataset.categoria; renderizarFiltros(); renderizarPosts(); });
            });
        }

        async function cargarComentarios(id) {
            try {
                const res = await fetch(`/api/foro/publicaciones/${id}/comentarios`);
                const data = await res.json();
                const comentarios = data.comentarios || [];
                currentComments = comentarios;
                const container = document.getElementById('listaComentarios');
                if (!comentarios.length) {
                    container.innerHTML = '<p style="text-align:center; color:#666;">No hay comentarios aún. ¡Sé el primero!</p>';
                } else {
                    container.innerHTML = comentarios.map(c => {
                        const esMiComentario = usuarioActual && c.usuario?.id === usuarioActual.id;
                        return `
                            <div style="border-bottom:1px solid #eee; padding:10px 0; position:relative;">
                                <b>${c.usuario?.nombres || 'Usuario'} ${c.usuario?.apellidos || ''}</b>
                                <p style="margin:5px 0;">${escapeHtml(c.contenido)}</p>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <small style="color:#666;">${new Date(c.fechaCreacion).toLocaleDateString()}</small>
                                    ${esMiComentario ? `
                                        <div style="display:flex; gap:10px;">
                                            <span style="color:#2563EB; cursor:pointer; font-size:0.85rem;" onclick="abrirEditarComentario(${c.id})">✏️ editar</span>
                                            <span style="color:#EF4444; cursor:pointer; font-size:0.85rem;" onclick="eliminarComentario(${c.id})">🗑️ Eliminar</span>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) { container.innerHTML = '<p>Error al cargar comentarios</p>'; }
        }

        function abrirEditarComentario(id) {
            const comment = currentComments.find(c => c.id === id);
            if (!comment) return;
            document.getElementById('editComentarioId').value = comment.id;
            document.getElementById('editComentarioTexto').value = comment.contenido;
            document.getElementById('modalEditarComentario').style.display = 'flex';
        }

        async function actualizarComentario() {
            const id = document.getElementById('editComentarioId').value;
            const contenido = document.getElementById('editComentarioTexto').value;
            if (!contenido.trim()) { alert('El comentario no puede estar vacío'); return; }
            
            const res = await fetch(`/api/foro/comentarios/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contenido: contenido })
            });
            if (res.ok) {
                cerrarModal('modalEditarComentario');
                cargarComentarios(publicacionActualId);
                cargarPublicaciones();
            } else {
                alert('Error al actualizar el comentario');
            }
        }

        async function eliminarComentario(id) {
            if (confirm('¿Eliminar este comentario?')) {
                const res = await fetch(`/api/foro/comentarios/${id}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    cargarComentarios(publicacionActualId);
                    cargarPublicaciones();
                } else {
                    alert('Error al eliminar el comentario');
                }
            }
        }

        async function enviarComentario() {
            const texto = document.getElementById('comentarioTexto').value;
            if (!texto.trim()) { alert('Escribe un comentario'); return; }
            const res = await fetch(`/api/foro/publicaciones/${publicacionActualId}/comentarios`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contenido: texto })
            });
            if (res.ok) {
                document.getElementById('comentarioTexto').value = '';
                cargarComentarios(publicacionActualId);
                cargarPublicaciones();
            } else { alert('Error al enviar comentario'); }
        }

        function verComentarios(id) {
            publicacionActualId = id;
            cargarComentarios(id);
            document.getElementById('modalComentarios').style.display = 'flex';
        }

        function abrirEditar(post) {
            document.getElementById('editId').value = post.id;
            document.getElementById('editTitulo').value = post.titulo;
            document.getElementById('editCategoria').value = post.categoria;
            document.getElementById('editContenido').value = post.contenido;
            document.getElementById('modalEditar').style.display = 'flex';
        }

        async function actualizarPublicacion() {
            const id = document.getElementById('editId').value;
            const data = {
                titulo: document.getElementById('editTitulo').value,
                categoria: document.getElementById('editCategoria').value,
                contenido: document.getElementById('editContenido').value
            };
            if (!data.titulo || !data.contenido) { alert('Completa todos los campos'); return; }
            const res = await fetch(`/api/foro/publicaciones/${id}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                cerrarModal('modalEditar');
                cargarPublicaciones();
            } else { alert('Error al actualizar'); }
        }

        function renderizarPosts() {
            const filtered = currentFilter === 'Todos' ? allPosts : allPosts.filter(p => p.categoria === currentFilter);
            const container = document.getElementById('postsList');
            if (!filtered.length) { container.innerHTML = '<div style="text-align:center; padding:3rem;"><p>No hay publicaciones en esta categoría</p></div>'; return; }
            container.innerHTML = filtered.map(p => {
                const esMiPost = usuarioActual && p.usuario?.id === usuarioActual.id;
                return `
                    <div class="rs-post-card">
                        <div class="rs-post-header">
                            <div class="rs-post-avatar">${p.usuario?.nombres?.charAt(0) || 'U'}</div>
                            <div style="flex:1;">
                                <div class="rs-post-author">${p.usuario?.nombres || 'Usuario'} ${p.usuario?.apellidos || ''}</div>
                                <div class="rs-post-date">${p.categoria} • ${new Date(p.fechaCreacion).toLocaleDateString()}</div>
                            </div>
                            ${esMiPost ? `
                                <div style="display:flex; gap:8px;">
                                    <span style="color:#2563EB; cursor:pointer;" onclick='abrirEditar(${JSON.stringify(p).replace(/'/g, "\\'")})'>✏️ editar</span>
                                    <span style="color:#EF4444; cursor:pointer;" onclick="eliminarPublicacion(${p.id})">🗑️ Eliminar</span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="rs-post-title">${escapeHtml(p.titulo)}</div>
                        <div class="rs-post-content">${escapeHtml(p.contenido)}</div>
                        <div class="rs-post-stats">
                            <span style="cursor:pointer" onclick="darLike(${p.id})">❤️ me gusta ${p.likes || 0}</span>
                            <span style="cursor:pointer" onclick="verComentarios(${p.id})">💬 ${p.comentariosCount || 0}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function darLike(id) { await fetch(`/api/foro/publicaciones/${id}/like`, { method: 'POST' }); cargarPublicaciones(); }
        async function eliminarPublicacion(id) { if (confirm('¿Eliminar esta publicación?')) { await fetch(`/api/foro/publicaciones/${id}`, { method: 'DELETE' }); cargarPublicaciones(); } }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function abrirModalCrear() { document.getElementById('modalCrear').style.display = 'flex'; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        document.getElementById('newPostBtn').onclick = abrirModalCrear;
        document.getElementById('guardarBtn').onclick = async () => {
            const titulo = document.getElementById('titulo').value, categoria = document.getElementById('categoria').value, contenido = document.getElementById('contenido').value;
            if (!titulo || !contenido) { alert('Completa todos los campos'); return; }
            const res = await fetch('/api/foro/publicaciones', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ titulo, categoria, contenido }) });
            if (res.ok) { cerrarModal('modalCrear'); document.getElementById('titulo').value = ''; document.getElementById('contenido').value = ''; cargarPublicaciones(); } 
            else { alert('Error al crear'); }
        };
        document.getElementById('actualizarBtn').onclick = actualizarPublicacion;
        document.getElementById('enviarComentarioBtn').onclick = enviarComentario;
        document.getElementById('actualizarComentarioBtn').onclick = actualizarComentario;

        obtenerUsuarioActual().then(() => cargarPublicaciones());
    </script>
    <style>
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}
        .modal-content{background:white;border-radius:16px;padding:24px;max-width:550px;width:90%}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .modal-close{font-size:1.8rem;cursor:pointer}
        .modal-input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
    </style>
</div>
</body>
</html>
